name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "apps/hub/**"
      - "apps/demos/**"
      - "packages/demo-registry/**"
      - "scripts/generate-demo-registry.mjs"
      - "scripts/detect-deploy-targets.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Deploy hub and every demo regardless of changed files"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      demos_json: ${{ steps.detect.outputs.demos_json }}
      has_demos: ${{ steps.detect.outputs.has_demos }}
      deploy_hub: ${{ steps.detect.outputs.deploy_hub }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: detect
        run: node ./scripts/detect-deploy-targets.mjs
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          DEPLOY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_all && 'all' || 'auto' }}

  deploy-demos:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_demos == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo: ${{ fromJson(needs.detect-changes.outputs.demos_json) }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy changed demo
        run: pnpm run deploy
        working-directory: apps/demos/${{ matrix.demo }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-hub:
    needs:
      - detect-changes
      - deploy-demos
    if: needs.detect-changes.outputs.deploy_hub == 'true' && (needs.deploy-demos.result == 'success' || needs.deploy-demos.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run generate:registry

      - name: Validate Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy hub
        run: pnpm --filter @vibe-sites/hub run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
